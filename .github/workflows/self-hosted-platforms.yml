name: Self-hosted Platform Compatibility

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version to test on each self-hosted runner.
        required: true
        default: "3.14"
        type: choice
        options:
          - "3.13"
          - "3.14"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

permissions:
  contents: read

jobs:
  requested-platforms:
    name: self-hosted (${{ matrix.platform.name }}, py${{ inputs.python_version }})
    runs-on:
      - self-hosted
      - ${{ matrix.platform.runner_os }}
      - ${{ matrix.platform.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-10
            runner_os: Windows
            runner_label: windows-10
          - name: windows-11
            runner_os: Windows
            runner_label: windows-11
          - name: windows-server-2019
            runner_os: Windows
            runner_label: windows-server-2019
          - name: windows-server-2026
            runner_os: Windows
            runner_label: windows-server-2026
          - name: ubuntu-26.04
            runner_os: Linux
            runner_label: ubuntu-26.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Show runner identity
        run: python -c "import platform, sys; print(sys.version); print(platform.platform())"
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements/release.txt
          python -m pip install --no-deps -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py scripts/check-release-version.py scripts/check-release-controls.py scripts/check-secret-hygiene.py scripts/check-security-baseline.py scripts/new-production-evidence-template.py scripts/check-github-production-settings.py scripts/check-production-evidence.py scripts/check-production-readiness.py scripts/record-provider-drill-receipt.py scripts/check-release-assets.py scripts/check-content-capability-scope.py scripts/pip-audit-truststore.py
      - name: Security lint
        run: python -m ruff check --select S src scripts
      - name: Exception lint
        run: python -m ruff check --select BLE src scripts
      - name: Type check
        run: python -m mypy src
      - name: Test with source coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report
      - name: Verify repository release controls
        run: python scripts/check-release-controls.py
      - name: Secret hygiene
        run: python scripts/check-secret-hygiene.py --history
      - name: Static security baseline
        run: python scripts/check-security-baseline.py
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json
      - name: Verify live-content capability scope
        run: python scripts/check-content-capability-scope.py
