name: Self-hosted Platform Compatibility

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version to test on each self-hosted runner.
        required: true
        default: "3.14"
        type: choice
        options:
          - "3.13"
          - "3.14"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

permissions:
  contents: read

jobs:
  requested-platforms:
    name: self-hosted (${{ matrix.platform.name }}, py${{ inputs.python_version }})
    runs-on:
      - self-hosted
      - ${{ matrix.platform.runner_os }}
      - ${{ matrix.platform.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-10
            runner_os: Windows
            runner_label: windows-10
          - name: windows-11
            runner_os: Windows
            runner_label: windows-11
          - name: windows-server-2019
            runner_os: Windows
            runner_label: windows-server-2019
          - name: windows-server-2026
            runner_os: Windows
            runner_label: windows-server-2026
          - name: ubuntu-26.04
            runner_os: Linux
            runner_label: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Show runner identity
        run: python -c "import platform, sys; print(sys.version); print(platform.platform())"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py
      - name: Type check
        run: python -m mypy src
      - name: Test
        run: python -m pytest -q
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json
