name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

permissions:
  contents: read

jobs:
  build:
    name: build release artifacts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify release version
        if: github.ref_type == 'tag'
        run: python scripts/check-release-version.py --tag "${{ github.ref_name }}"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py scripts/check-release-version.py
      - name: Type check
        run: python -m mypy src
      - name: Test
        run: python -m pytest -q
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Verify wheel install
        run: python scripts/verify-dist.py
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: guildbridge-dist
          path: dist/*
          if-no-files-found: error

  windows-artifacts:
    name: build Windows installers
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify release version
        if: github.ref_type == 'tag'
        run: python scripts/check-release-version.py --tag "${{ github.ref_name }}"
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,windows-build]"
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 7.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build Windows ZIP and MSI
        run: .\scripts\build-windows-dist.ps1 -WixEulaId wix7
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: guildbridge-windows
          path: |
            dist/GuildBridge-*-windows-x64.zip
            dist/GuildBridge-*-windows-x64.msi
          if-no-files-found: error

  publish-release:
    name: publish GitHub release assets
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    needs: [build, windows-artifacts]
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -type f -maxdepth 1 -print | sort
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $TAG_NAME"
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Release $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" release-assets/* --clobber
