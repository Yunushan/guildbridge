name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py scripts/check-release-version.py scripts/check-security-baseline.py scripts/new-production-evidence-template.py scripts/check-github-production-settings.py scripts/check-production-evidence.py scripts/check-production-readiness.py scripts/record-provider-drill-receipt.py scripts/check-release-assets.py scripts/check-content-capability-scope.py scripts/pip-audit-truststore.py
      - name: Security lint
        run: python -m ruff check --select S src scripts
      - name: Exception lint
        run: python -m ruff check --select BLE src scripts
      - name: Type check
        run: python -m mypy src
      - name: Test with source coverage on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m coverage run -m pytest -q
      - name: Test with source coverage on other platforms
        if: runner.os != 'Linux'
        run: python -m coverage run -m pytest -q
      - name: Enforce source coverage
        run: python -m coverage report
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json
      - name: Verify live-content capability scope
        run: python scripts/check-content-capability-scope.py
      - name: Secret hygiene
        run: python scripts/check-secret-hygiene.py --history
      - name: Static security baseline
        run: python scripts/check-security-baseline.py

  hosted-compatibility:
    name: hosted compatibility (${{ matrix.platform }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-server-2022
            os: windows-2022
            python-version: "3.14"
          - platform: macos-26
            os: macos-26
            python-version: "3.14"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py scripts/check-release-version.py scripts/check-security-baseline.py scripts/new-production-evidence-template.py scripts/check-github-production-settings.py scripts/check-production-evidence.py scripts/check-production-readiness.py scripts/record-provider-drill-receipt.py scripts/check-release-assets.py scripts/check-content-capability-scope.py scripts/pip-audit-truststore.py
      - name: Security lint
        run: python -m ruff check --select S src scripts
      - name: Exception lint
        run: python -m ruff check --select BLE src scripts
      - name: Type check
        run: python -m mypy src
      - name: Test with source coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json
      - name: Verify live-content capability scope
        run: python scripts/check-content-capability-scope.py
      - name: Secret hygiene
        run: python scripts/check-secret-hygiene.py --history
      - name: Static security baseline
        run: python scripts/check-security-baseline.py

  desktop-gui-smoke:
    name: desktop GUI smoke (ubuntu-24.04, py3.14)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Construct the desktop GUI under Xvfb
        run: xvfb-run -a python -m pytest -q tests/test_gui_workflows.py

  container-smoke:
    name: container runtime smoke (ubuntu-24.04)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Build pinned runtime container
        run: docker build --pull=false --tag guildbridge:${{ github.sha }} .
      - name: Verify container entry point
        run: docker run --rm guildbridge:${{ github.sha }} --version

  package:
    name: package
    runs-on: ubuntu-24.04
    needs: [test, hosted-compatibility, desktop-gui-smoke, container-smoke]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Install build tools
        run: |
          python -m pip install --require-hashes -r requirements/release.txt
          python -m pip install --no-deps -e ".[dev]"
      - name: Verify repository release controls
        run: python scripts/check-release-controls.py
      - name: Secret hygiene
        run: python scripts/check-secret-hygiene.py --history
      - name: Static security baseline
        run: python scripts/check-security-baseline.py
      - name: Build distributions
        run: python -m build
      - name: Audit installed dependencies
        run: python scripts/pip-audit-truststore.py --strict
      - name: Check distributions
        run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Verify wheel install
        run: python scripts/verify-dist.py
