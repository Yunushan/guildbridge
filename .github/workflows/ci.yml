name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py
      - name: Type check
        run: python -m mypy src
      - name: Test
        run: python -m pytest -q
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json

  hosted-compatibility:
    name: hosted compatibility (${{ matrix.platform }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-server-2022
            os: windows-2022
            python-version: "3.14"
          - platform: macos-26
            os: macos-26
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py
      - name: Type check
        run: python -m mypy src
      - name: Test
        run: python -m pytest -q
      - name: Platform check
        run: python scripts/check-platform.py --require cli --format json

  package:
    name: package
    runs-on: ubuntu-24.04
    needs: [test, hosted-compatibility]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Verify wheel install
        run: python scripts/verify-dist.py
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: guildbridge-dist
          path: dist/*
          if-no-files-found: error
