stages:
  - test
  - package

image: python:3.14.5-slim@sha256:c845af9399020c7e562969a13689e929074a10fd057acd1b1fad06a2fb068e97

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

before_script:
  - python -m pip install --require-hashes -r requirements/release.txt
  - python -m pip install --no-deps -e ".[dev]"

test:
  stage: test
  script:
    - python -m ruff check src tests scripts/check-platform.py scripts/verify-dist.py scripts/check-content-capability-scope.py scripts/check-production-readiness.py scripts/record-provider-drill-receipt.py
    - python -m ruff check --select S src scripts
    - python -m ruff check --select BLE src scripts
    - python -m mypy src
    - python -m coverage run -m pytest -q
    - python -m coverage report
    - python scripts/check-platform.py --require cli --format json
    - python scripts/check-content-capability-scope.py
    - python scripts/check-release-controls.py
    - python scripts/check-secret-hygiene.py --history
    - python scripts/check-security-baseline.py

package:
  stage: package
  script:
    - rm -rf dist
    - python -m build
    - python scripts/pip-audit-truststore.py --strict
    - python -m twine check dist/*.whl dist/*.tar.gz
    - python scripts/verify-dist.py
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: 14 days
